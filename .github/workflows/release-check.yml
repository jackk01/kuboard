name: Release Check

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Release Check
        run: sh ./scripts/release_check.sh

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: kuboard/backend:ci

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: kuboard/frontend:ci

      - name: Package Helm Chart
        run: |
          mkdir -p dist/helm
          helm package deploy/helm/kuboard --destination dist/helm
          helm template kuboard deploy/helm/kuboard > dist/helm/kuboard-rendered.yaml

      - name: Upload Packaging Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kuboard-packaging
          path: |
            dist/helm/*.tgz
            dist/helm/kuboard-rendered.yaml
