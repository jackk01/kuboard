apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kuboard.fullname" . }}-config
  labels:
    {{- include "kuboard.labels" . | nindent 4 }}
data:
  DJANGO_DEBUG: "false"
  DJANGO_TIME_ZONE: {{ .Values.global.timezone | quote }}
  DJANGO_ALLOWED_HOSTS: {{ .Values.backend.allowedHosts | quote }}
  DJANGO_CSRF_TRUSTED_ORIGINS: {{ .Values.backend.csrfTrustedOrigins | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.backend.corsAllowedOrigins | quote }}
  DJANGO_USE_X_FORWARDED_HOST: "true"
  DJANGO_TRUST_X_FORWARDED_PROTO: "true"
  SESSION_COOKIE_SECURE: {{ ternary "true" "false" .Values.backend.secureCookies | quote }}
  CSRF_COOKIE_SECURE: {{ ternary "true" "false" .Values.backend.secureCookies | quote }}
  DJANGO_SECURE_HSTS_SECONDS: {{ printf "%d" (int .Values.backend.hstsSeconds) | quote }}
  SQLITE_PATH: "/data/db.sqlite3"
  REDIS_URL: "redis://{{ include "kuboard.fullname" . }}-redis:6379/1"
  CELERY_BROKER_URL: "redis://{{ include "kuboard.fullname" . }}-redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://{{ include "kuboard.fullname" . }}-redis:6379/1"
  KUBOARD_BOOTSTRAP_ADMIN: {{ ternary "true" "false" .Values.backend.bootstrapAdmin | quote }}
  UVICORN_WORKERS: {{ printf "%d" (int .Values.backend.workers) | quote }}
  KUBOARD_API_UPSTREAM: "{{ include "kuboard.fullname" . }}-backend:8000"
