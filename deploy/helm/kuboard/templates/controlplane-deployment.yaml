{{- if ne (int .Values.backend.replicas) 1 }}
{{- fail "backend.replicas must stay at 1 in SQLite mode" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kuboard.fullname" . }}-controlplane
  labels:
    {{- include "kuboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kuboard.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: controlplane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kuboard.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: controlplane
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          args: ["api"]
          envFrom:
            - configMapRef:
                name: {{ include "kuboard.fullname" . }}-config
            - secretRef:
                name: {{ include "kuboard.fullname" . }}-secret
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: sqlite
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources.backend | nindent 12 }}
        - name: worker
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          args: ["worker"]
          envFrom:
            - configMapRef:
                name: {{ include "kuboard.fullname" . }}-config
            - secretRef:
                name: {{ include "kuboard.fullname" . }}-secret
          env:
            - name: KUBOARD_BOOTSTRAP_ADMIN
              value: "false"
          volumeMounts:
            - name: sqlite
              mountPath: /data
          resources:
            {{- toYaml .Values.backend.resources.worker | nindent 12 }}
      volumes:
        - name: sqlite
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kuboard.fullname" . }}-sqlite
          {{- else }}
          emptyDir: {}
          {{- end }}
