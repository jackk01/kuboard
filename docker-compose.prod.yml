version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["api"]
    environment:
      PORT: 8000
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-replace-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://127.0.0.1,http://localhost}
      DJANGO_USE_X_FORWARDED_HOST: "true"
      DJANGO_TRUST_X_FORWARDED_PROTO: "true"
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-false}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-0}
      SQLITE_PATH: /data/db.sqlite3
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1,http://localhost}
      KUBOARD_ENCRYPTION_KEY: ${KUBOARD_ENCRYPTION_KEY:-replace-with-32-byte-secret}
      KUBOARD_BOOTSTRAP_ADMIN: ${KUBOARD_BOOTSTRAP_ADMIN:-true}
      KUBOARD_ADMIN_EMAIL: ${KUBOARD_ADMIN_EMAIL:-admin@kuboard.local}
      KUBOARD_ADMIN_PASSWORD: ${KUBOARD_ADMIN_PASSWORD:-admin123456}
      KUBOARD_ADMIN_DISPLAY_NAME: ${KUBOARD_ADMIN_DISPLAY_NAME:-Kuboard Admin}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    volumes:
      - sqlite-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["worker"]
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-replace-me}
      SQLITE_PATH: /data/db.sqlite3
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      KUBOARD_ENCRYPTION_KEY: ${KUBOARD_ENCRYPTION_KEY:-replace-with-32-byte-secret}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-1}
      KUBOARD_BOOTSTRAP_ADMIN: "false"
    volumes:
      - sqlite-data:/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      KUBOARD_API_UPSTREAM: backend:8000
    ports:
      - "${KUBOARD_WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  sqlite-data:

